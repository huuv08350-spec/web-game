<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .card {
        background: #ffffff;
        width: 360px;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .card h1 {
        margin: 0;
        font-size: 26px;
        color: #333;
      }

      .card p {
        margin: 8px 0 24px;
        font-size: 14px;
        color: #666;
      }

      .input-group {
        margin-bottom: 16px;
      }

      .input-group input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: all 0.2s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      }

      .gender {
        text-align: left;
        font-size: 14px;
        color: #444;
        margin-bottom: 20px;
      }

      .gender label {
        margin-right: 12px;
        cursor: pointer;
      }

      .gender input {
        margin-right: 4px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
      }

      .btn:active {
        transform: translateY(0);
        box-shadow: none;
      }

      .link {
        margin-top: 18px;
        font-size: 14px;
      }

      .link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
      }

      .link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Đăng ký</h1>
      <p>Chúng tôi rất vui khi được bạn chọn trang web của chúng tôi</p>

      <div class="input-group">
        <input type="text" id="username" placeholder="Tên đăng nhập" />
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Mật khẩu" />
      </div>

      <div class="gender">
        <strong>Giới tính</strong><br /><br />
        <label> <input type="radio" name="gender" value="Nam" /> Nam </label>
        <label> <input type="radio" name="gender" value="Nữ" /> Nữ </label>
        <label> <input type="radio" name="gender" value="Khác" /> Khác </label>
      </div>

      <button class="btn" onclick="register()">Đăng ký</button>

      <div class="link">
        Đã có tài khoản?
        <a href="login.html">Đăng nhập</a>
      </div>
    </div>

    <script>
      function register() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const gender = document.querySelector('input[name="gender"]:checked');

        if (!username || !password) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        if (username.length < 6 || username.length > 18) {
          alert("Tên đăng nhập phải từ 6 đến 18 ký tự!");
          return;
        }

        if (password.length < 6 || password.length > 18) {
          alert("Mật khẩu phải từ 6 đến 18 ký tự!");
          return;
        }

        if (!gender) {
          alert("Vui lòng chọn giới tính!");
          return;
        }

        if (localStorage.getItem("user_" + username)) {
          alert("Tên đăng nhập đã tồn tại!");
          return;
        }

        const user = {
          username,
          password,
          gender: gender.value,
        };

        localStorage.setItem("user_" + username, JSON.stringify(user));
        alert("Đăng ký thành công!");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
